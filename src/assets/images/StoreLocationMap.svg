<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Map -->
  <rect width="800" height="400" fill="#e5e7eb" />
  
  <!-- Map Grid Lines -->
  <g stroke="#d1d5db" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="250" x2="800" y2="250" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="350" x2="800" y2="350" />
    
    <line x1="100" y1="0" x2="100" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="400" y1="0" x2="400" y2="400" />
    <line x1="500" y1="0" x2="500" y2="400" />
    <line x1="600" y1="0" x2="600" y2="400" />
    <line x1="700" y1="0" x2="700" y2="400" />
  </g>
  
  <!-- Roads -->
  <g stroke="#9ca3af" stroke-width="6">
    <line x1="0" y1="120" x2="800" y2="120" />
    <line x1="0" y1="280" x2="800" y2="280" />
    <line x1="150" y1="0" x2="150" y2="400" />
    <line x1="450" y1="0" x2="450" y2="400" />
    <line x1="650" y1="0" x2="650" y2="400" />
  </g>
  
  <!-- Main Roads -->
  <g stroke="#6b7280" stroke-width="10">
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="350" y1="0" x2="350" y2="400" />
  </g>
  
  <!-- Road Labels -->
  <g fill="#4b5563" font-family="Arial" font-size="12">
    <text x="760" y="195">Main St</text>
    <text x="355" y="20" transform="rotate(90, 355, 20)">Fashion Ave</text>
    <text x="455" y="20" transform="rotate(90, 455, 20)">Style Blvd</text>
    <text x="155" y="20" transform="rotate(90, 155, 20)">Designer Rd</text>
    <text x="655" y="20" transform="rotate(90, 655, 20)">Boutique Ln</text>
  </g>
  
  <!-- Buildings -->
  <g fill="#d1d5db">
    <rect x="170" y="140" width="60" height="40" />
    <rect x="250" y="140" width="80" height="40" />
    <rect x="170" y="220" width="60" height="40" />
    <rect x="370" y="140" width="60" height="40" />
    <rect x="370" y="220" width="60" height="40" />
    <rect x="470" y="140" width="40" height="40" />
    <rect x="470" y="220" width="40" height="40" />
    <rect x="550" y="140" width="80" height="40" />
    <rect x="550" y="220" width="80" height="40" />
    <rect x="670" y="140" width="50" height="40" />
    <rect x="670" y="220" width="50" height="40" />
  </g>
  
  <!-- Store Location (Highlight) -->
  <rect x="370" y="220" width="60" height="40" fill="#818cf8" />
  
  <!-- Store Location Marker -->
  <g transform="translate(400, 240)">
    <!-- Pin Base -->
    <circle cx="0" cy="0" r="15" fill="#4f46e5" />
    
    <!-- Pin Icon -->
    <path d="M0,-12 L0,5 M-5,0 L5,0" stroke="white" stroke-width="3" />
  </g>
  
  <!-- Parks/Green Areas -->
  <g fill="#bfdbae">
    <rect x="170" y="20" width="160" height="80" rx="10" />
    <rect x="470" y="20" width="160" height="80" rx="10" />
    <rect x="170" y="300" width="160" height="80" rx="10" />
    <rect x="470" y="300" width="160" height="80" rx="10" />
  </g>
  
  <!-- Water Feature -->
  <rect x="50" y="300" width="80" height="80" rx="10" fill="#a5b4fc" />
  
  <!-- Legend -->
  <rect x="20" y="20" width="110" height="80" rx="5" fill="white" fill-opacity="0.8" />
  <text x="30" y="40" font-family="Arial" font-size="12" font-weight="bold" fill="#4b5563">Style District</text>
  <circle cx="35" cy="60" r="5" fill="#4f46e5" />
  <text x="45" y="65" font-family="Arial" font-size="12" fill="#4b5563">Our Store</text>
  <rect x="30" y="75" width="10" height="10" fill="#bfdbae" />
  <text x="45" y="85" font-family="Arial" font-size="12" fill="#4b5563">Parks</text>
  
  <!-- North Arrow -->
  <g transform="translate(750, 50)">
    <circle cx="0" cy="0" r="15" fill="white" fill-opacity="0.8" />
    <text x="0" y="5" font-family="Arial" font-size="14" font-weight="bold" fill="#4b5563" text-anchor="middle">N</text>
  </g>
  
  <!-- Scale -->
  <g transform="translate(650, 370)">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#4b5563" stroke-width="2" />
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#4b5563" stroke-width="2" />
    <line x1="100" y1="-5" x2="100" y2="5" stroke="#4b5563" stroke-width="2" />
    <text x="50" y="20" font-family="Arial" font-size="10" fill="#4b5563" text-anchor="middle">500m</text>
  </g>
  
  <!-- "You Are Here" Pulse Effect -->
  <circle cx="400" cy="240" r="25" fill="#4f46e5" opacity="0.2">
    <animate attributeName="r" values="15;30;15" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>